<div class="group bg-white rounded-2xl border border-gray-100 hover:shadow-lg transition-all duration-300 overflow-hidden flex flex-col">
  <a [routerLink]="['/products', product().handle]" class="relative block overflow-hidden bg-gray-50">
    <img
      [src]="product().featuredImage?.url ?? '/icons/icon-192x192.png'"
      [alt]="product().featuredImage?.altText ?? product().title"
      class="w-full aspect-square object-cover group-hover:scale-105 transition-transform duration-300"
      loading="lazy"
    />
    @if (discount() > 0) {
      <span class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">
        {{ discount() }}% OFF
      </span>
    }
    @if (!product().availableForSale) {
      <div class="absolute inset-0 bg-white/60 flex items-center justify-center">
        <span class="bg-gray-700 text-white text-sm px-3 py-1 rounded-full">Sold Out</span>
      </div>
    }
  </a>

  <div class="p-3 flex flex-col flex-1">
    <a [routerLink]="['/products', product().handle]" class="text-sm font-medium text-gray-800 line-clamp-2 hover:text-[#439D4C] transition-colors flex-1">
      {{ product().title }}
    </a>

    <div class="mt-2 flex items-center gap-2">
      <span class="font-bold text-gray-900">{{ product().priceRange.minVariantPrice.amount | inr }}</span>
      @if (comparePrice() > 0 && comparePrice() > price()) {
        <span class="text-xs text-gray-400 line-through">{{ comparePrice() | inr }}</span>
      }
    </div>

    <button
      [disabled]="!product().availableForSale || cart.loading()"
      (click)="addToCart($event)"
      class="mt-3 w-full bg-[#439D4C] hover:bg-[#37883f] disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-medium py-2 rounded-xl transition-colors"
    >
      {{ product().availableForSale ? 'Add to Cart' : 'Sold Out' }}
    </button>
  </div>
</div>
